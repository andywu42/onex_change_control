---
# ONEX Change Control Pre-commit Configuration
# Mirrors ONEX ecosystem settings for consistency
#
# PERFORMANCE OPTIMIZATION:
# =========================
# Two-stage validation strategy for optimal developer experience:
#
# PRE-COMMIT (target: <15 seconds):
#   - Formatting (ruff format/fix)
#   - Basic file checks (whitespace, large files, merge conflicts)
#
# PRE-PUSH (quick validation before sharing):
#   - mypy type checking (changed files only)
#
# Note: ruff replaces both black and isort (10-100x faster)
#
# USAGE:
#   pre-commit install                    # Install pre-commit hooks
#   pre-commit install --hook-type pre-push  # Install pre-push hooks
#   pre-commit run --all-files            # Run all pre-commit hooks
repos:
  # YAML formatting (standard across ecosystem, OMN-4862)
  # Configuration in .yamlfmt file (ecosystem-aligned settings)
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        exclude: ^(\.github/|templates/)

  # Essential file formatting (standard across ecosystem)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude: ^\.github/workflows/claude.*\.yml$  # Exclude Claude workflows to match main exactly
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
  # ONEX Python Development Hooks
  # Order: ruff format → ruff check (formatting before linting)
  # Note: ruff replaces both black and isort (10-100x faster)
  # Using official ruff-pre-commit for consistency across environments
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6  # Upgraded to canonical ecosystem version (OMN-4858)
    hooks:
      - id: ruff-format
        name: ruff format (auto-format)
        stages: [pre-commit]
      - id: ruff
        name: ruff check (linting + import sorting)
        args: [--fix, --exit-non-zero-on-fix]
        stages: [pre-commit]
  # Local hooks — all use uv run for consistency
  - repo: local
    hooks:
      - id: mypy-type-check
        name: mypy (type checking)
        entry: bash -c 'uv run mypy "$@" --show-error-codes --no-error-summary' --
        language: system
        types: [python]
        files: ^(src/onex_change_control/|tests/).*\.py$  # Check both source and tests for consistency with CI
        pass_filenames: true  # Only check changed files, not entire codebase
        stages: [pre-push]  # Moved to pre-push: ~1-5s for changed files only
      - id: validate-string-versions
        name: Reject hardcoded __version__ in __init__.py
        language: system
        entry: uv run python scripts/validation/validate_string_versions.py
        types: [python]
        pass_filenames: true
        stages: [pre-commit]
      - id: check-ai-slop
        name: Check for AI-slop patterns
        language: system
        entry: uv run python scripts/validation/check_ai_slop.py --strict
        types_or: [python, markdown]
        pass_filenames: true
        stages: [pre-commit]
      - id: no-env-file
        name: Reject committed .env files (except .env.example)
        entry: bash -c 'if git diff --cached --name-only | grep -E "(^|/)\\.env([._-].+)?$" | grep -vE
          "\\.env\\.example" | grep -q .; then echo "BLOCKED - .env staged. Use ~/.omnibase/.env instead.
          To unstage, run git reset HEAD <file>"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: no-planning-docs
        name: Block planning docs (belong in omni_home/docs/plans/)
        entry: "bash -c 'PLAN_FILES=$(git diff --cached --name-only -- \"docs/plans/\"); if [ -n \"$PLAN_FILES\"
          ]; then echo \"ERROR: Planning docs must live in omni_home/docs/plans/, not in this repo:\";
          echo \"$PLAN_FILES\"; echo; echo \"Move your file to: /Volumes/PRO-G40/Code/omni_home/docs/plans/\";
          exit 1; fi'"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: validate-spdx-headers
        name: ONEX SPDX Header Requirement
        entry: uv run python scripts/validation/validate_spdx_headers.py
        language: system
        pass_filenames: true
        files: ^(src|tests|scripts|examples)/.*\.py$
        exclude: ^(archived/|archive/)
        stages: [pre-commit]
      - id: check-db-boundary-registry
        name: DB boundary exception registry validation
        entry: bash -c 'uv run check-db-boundary --validate-all --registry registry/db-boundary-exceptions.yaml'
        language: system
        pass_filenames: false
        files: ^registry/db-boundary-exceptions\.yaml$
        stages: [pre-commit]
      - id: check-published-events-structure
        name: Validate published_events structure in contract.yaml
        entry: uv run python scripts/validation/check_published_events_structure.py
        language: system
        pass_filenames: true
        files: contract\.yaml$
        stages: [pre-commit]
      - id: check-seam-contract-coverage
        name: Seam contract coverage (warn if contract missing)
        entry: uv run python scripts/validation/check_seam_contract_coverage.py --warn-only
        language: system
        pass_filenames: false
        files: ^src/onex_change_control/(kafka|models/model_|enums/enum_interface)
        stages: [pre-commit]
      - id: no-hardcoded-topics
        name: No hardcoded ONEX topic strings
        language: system
        entry: uv run check-hardcoded-topics
        types_or: [python, yaml, ts, javascript]
        exclude: ^(contracts/|src/onex_change_control/boundaries/)  # Manifests that ARE the topic registry
        pass_filenames: true
        stages: [pre-commit]
      - id: no-untracked-todos
        name: No untracked TODO/FIXME/HACK comments
        language: system
        entry: uv run check-todo-format
        types: [python]
        stages: [pre-commit]
      - id: no-required-anthropic-key
        name: Block ANTHROPIC_API_KEY as required (OMN-7467)
        language: system
        entry: uv run check-anthropic-key-guard
        types_or: [python, markdown, yaml, ts, javascript]
        exclude: ^(tests/|examples/|docs/)
        stages: [pre-commit]
      - id: validate-contract-yaml
        name: Validate ticket contract YAML against ModelTicketContract (OMN-8808)
        language: system
        entry: uv run validate-yaml
        files: ^contracts/OMN-.*\.yaml$
        pass_filenames: true
        stages: [pre-commit]
      - id: lint-contract-check-values
        name: Contract check_value fail-open pattern lint (OMN-9350)
        entry: uv run python scripts/lint_contract_check_values.py
        language: system
        files: ^contracts/.*\.yaml$
        pass_filenames: true
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: normalization-symmetry
        name: normalization-symmetry
        entry: uv run python -m omnibase_core.validation.checker_normalization_symmetry
        language: system
        pass_filenames: false

# Configuration
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]
fail_fast: false

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes for onex_change_control

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_schedule: weekly
  submodules: false
