---
# Migration Conflict Suppressions
#
# This file lists known, intentional migration conflicts that should not
# cause CI to fail. Each entry documents WHY the conflict exists and which
# repos are involved.
#
# Categories:
#   cross_repo_shared_schema: Table DDL is intentionally duplicated across repos
#     because each repo deploys its own migrations independently. The schemas
#     are identical (EXACT_DUPLICATE).
#   omnidash_read_model: omnidash maintains its own read-model projection tables
#     with a different schema than the upstream source-of-truth tables
#     (NAME_CONFLICT). This is intentional — omnidash analytics tables are
#     denormalized projections, not the canonical schema.
#   intra_repo_duplicate: The same table appears in multiple migration files
#     within the same repo (e.g., test fixtures, legacy numbered migrations).
#   schema_evolution: Table was redefined with additional columns in a later
#     migration within the same repo (intentional schema evolution).

suppressions:
  # ── EXACT_DUPLICATE: Cross-repo shared schema ──────────────────────────
  # These tables have identical DDL across repos. Each repo owns its own
  # migration files for independent deployment.

