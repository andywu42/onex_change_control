---
version: "1.0"
tiers:
  - name: canary
    description: Low-risk, low-dependency repos for early validation of CI/infra changes.
    repos:
      - omnibase_compat
      - omniweb

  - name: early_adopter
    description: Medium-risk repos with moderate dependency graphs. Validates cross-repo integration.
    repos:
      - omniclaude
      - omnibase_spi
      - onex_change_control
      - omnimarket

  - name: ga
    description: High-dependency, high-risk repos. Only receive changes after canary and early_adopter
      tiers pass.
    repos:
      - omnibase_core
      - omnibase_infra
      - omniintelligence
      - omnimemory
      - omnidash
      - omninode_infra
      - omnigemini
