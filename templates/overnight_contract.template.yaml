# Overnight session contract template
# Generated by: onex create-overnight-contract --session-id <UUID>
schema_version: "1.0.0"
session_id: "<UUID>"
created_at: "<ISO8601>"
max_cost_usd: 5.0
max_duration_seconds: 28800
dry_run: false

phases:
  - phase_name: BUILD_LOOP
    required: true
    halt_on_failure: true
    timeout_seconds: 14400
    success_criteria:
      - "at least 1 ticket dispatched"
      - "no circuit breaker triggered"
  - phase_name: MERGE_SWEEP
    required: false
    halt_on_failure: false
    timeout_seconds: 3600
  - phase_name: CI_WATCH
    required: false
    halt_on_failure: false
    timeout_seconds: 7200
  - phase_name: PLATFORM_READINESS
    required: true
    halt_on_failure: false
    timeout_seconds: 1800

halt_conditions:
  - condition_id: cost_ceiling
    description: "Stop if cost exceeds $5 USD"
    check_type: cost_ceiling
    threshold: 5.0
  - condition_id: phase_failure_limit
    description: "Stop after 3 consecutive phase failures"
    check_type: phase_failure_count
    threshold: 3.0

standing_orders:
  - "Run merge sweep before build loop"
  - "Skip tickets labeled needs-subplan"
  - "Do not create new epics overnight"

required_outcomes:
  - merge_sweep_completed
  - platform_readiness_gate_passed
