---
schema_version: '1.0.0'
ticket_id: OMN-9350
summary: 'feat(pre-commit): linter for fail-open patterns in contract DoD check_value shell fragments'
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: CI passes on merge PR
    command: gh pr checks
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: PR opened against main branch
    source: generated
    checks:
      - check_type: command
        check_value: 'state=$(gh pr view {pr} --repo {repo} --json state,baseRefName -q ''[.state, .baseRefName]
          | @tsv''); [ "$(echo "$state" | cut -f1)" = "OPEN" ] && [ "$(echo "$state" | cut -f2)" = "main"
          ]'
  - id: dod-002
    description: Contract artifact file present in repo
    source: generated
    checks:
      - check_type: command
        check_value: test -f contracts/OMN-9350.yaml
  - id: dod-003
    description: Linter hook wired into .pre-commit-config.yaml
    source: generated
    checks:
      - check_type: command
        check_value: grep -q 'lint-contract-check-values' .pre-commit-config.yaml
  - id: dod-004
    description: Linter script present in repo
    source: generated
    checks:
      - check_type: command
        check_value: test -f scripts/lint_contract_check_values.py
  - id: dod-005
    description: Linter unit tests present in repo
    source: generated
    checks:
      - check_type: command
        check_value: test -f tests/unit/scripts/test_lint_contract_check_values.py
