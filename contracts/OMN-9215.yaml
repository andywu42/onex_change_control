---
schema_version: '1.0.0'
ticket_id: OMN-9215
summary: 'fix(dispatch): index handler by contract event_type alias + envelope-wrap publisher'
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - events
  - envelopes
evidence_requirements:
  - kind: ci
    description: CI passes on merge PR
    command: gh pr checks
  - kind: tests
    description: Unit + integration tests for handler event_type alias dispatch
    command: 'uv run pytest tests/unit/runtime/auto_wiring/test_handler_wiring_event_type_alias.py tests/integration/test_handler_event_type_alias_integration.py
      -v'
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: PR opened against main branch
    source: generated
    checks:
      - check_type: command
        check_value: 'state=$(gh pr view {pr} --repo {repo} --json state,baseRefName -q ''[.state, .baseRefName]
          | @tsv''); [ "$(echo "$state" | cut -f1)" = "OPEN" ] && [ "$(echo "$state" | cut -f2)" = "main"
          ]'
  - id: dod-002
    description: Contract artifact file present in repo
    source: generated
    checks:
      - check_type: command
        check_value: 'test -f contracts/OMN-9215.yaml'
  - id: dod-003
    description: CI Validate Contract YAML check passes on PR
    source: generated
    checks:
      - check_type: command
        check_value: 'result=$(gh pr view {pr} --repo {repo} --json statusCheckRollup -q ''[.statusCheckRollup[]
          | select(.name == "Validate Contract YAML (OMN-8808)") | .conclusion] | first // empty''); [
          "$result" = "SUCCESS" ]'
  - id: dod-004
    description: dod-004 PASS receipt present (proves code-presence check was run against omnibase_infra
      PR  #1353 — receipt carries commit_sha c1b8ab8c and exit_code 0)
    source: generated
    checks:
      - check_type: command
        check_value: 'test -f drift/dod_receipts/OMN-9215/dod-004/command.yaml && grep -q "status: PASS"
          drift/dod_receipts/OMN-9215/dod-004/command.yaml'
