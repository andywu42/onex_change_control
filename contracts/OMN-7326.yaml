dod_evidence:
  - id: "dod-001"
    description: "PR opened against main branch"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "gh pr view {pr} --repo {repo} --json state -q .state"
  - id: "dod-002"
    description: "PR mergedAt query returns OK"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "gh pr view {pr} --repo {repo} --json mergedAt -q .mergedAt"
  - id: "dod-003"
    description: "Tests pass in CI"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: >-
          result=$(gh pr view {pr} --repo {repo} --json statusCheckRollup -q '[.statusCheckRollup[] |
          select(.name == "validate") | .conclusion] | first // empty'); [ "$result" = "SUCCESS" ]
  - id: "dod-004"
    description: "Pre-commit hooks clean"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "pre-commit run --all-files"
