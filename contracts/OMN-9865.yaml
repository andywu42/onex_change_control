summary: "Add detect-changes job to .github/workflows/ci.yml in shadow mode (outputs only, 40-split test-parallel
  matrix unchanged) between quality-gate and test-parallel"
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: "omnibase_core PR #936 CI checks pass (verify/verify gate green)"
    command: "gh pr checks 936 --repo OmniNode-ai/omnibase_core --watch"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: dod-001
    description: "detect-changes job exists in ci.yml with name 'Detect Changes (shadow)', needs: quality-gate,
      and emits exactly the 5 required outputs (is_full_suite, full_suite_reason, split_count, matrix,
      selected_paths)"
    source: generated
    checks:
      - check_type: command
        check_value: "uv run python -c \"import yaml; wf=yaml.safe_load(open('.github/workflows/ci.yml').read());
          job=wf['jobs']['detect-changes']; assert job['name']=='Detect Changes (shadow)', job['name'];
          assert job['needs']=='quality-gate', job['needs']; assert set(job['outputs'].keys())=={'is_full_suite','full_suite_reason','split_count','matrix','selected_paths'},
          list(job['outputs'].keys()); print('detect-changes job OK')\""
  - id: dod-002
    description: "ci.yml parses cleanly as YAML and the 40-split test-parallel matrix is unchanged (split_count
      == 40)"
    source: generated
    checks:
      - check_type: command
        check_value: "uv run python -c \"import yaml; wf=yaml.safe_load(open('.github/workflows/ci.yml').read());
          tp=wf['jobs']['test-parallel']; splits=tp['strategy']['matrix']['split']; assert len(splits)==40,
          len(splits); print('test-parallel matrix unchanged:', len(splits), 'splits')\""
  - id: dod-003
    description: "compute_selection unit tests pass (Python script's typed JSON output is the source of
      truth for selection logic)"
    source: generated
    checks:
      - check_type: test_passes
        check_value: "uv run pytest tests/unit/scripts/ci/test_detect_test_paths.py -q"
