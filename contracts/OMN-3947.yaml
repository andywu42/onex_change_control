---
schema_version: "1.0.0"
ticket_id: OMN-3947
summary: "Manual trigger CLI command: omni-infra artifact-reconcile publishes ModelManualReconcileCommand
  to onex.cmd.artifact.reconcile.v1"
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - topics
  - events
evidence_requirements:
  - kind: tests
    description: >
      Click command artifact-reconcile is registered in the CLI entry point; --repo, --files, and --reason
      options are all present and correctly typed.
    command: "uv run omni-infra artifact-reconcile --help"

  - kind: tests
    description: >
      ModelManualReconcileCommand is published to onex.cmd.artifact.reconcile.v1 using KAFKA_BOOTSTRAP_SERVERS
      from env (local bus by default); command exits 0 on success.
    command: "uv run pytest tests/unit/ -k artifact_reconcile -v -m unit"

  - kind: ci
    description: "mypy --strict passes on new artifact_reconcile CLI module."
    command: "uv run mypy src/omnibase_infra/cli/artifact_reconcile.py --strict"

  - kind: tests
    description: "Full unit test suite passes with no regressions."
    command: "uv run pytest tests/ -m unit -v"

golden_path:
  input:
    topic: "onex.cmd.artifact.reconcile.v1"
    fixture: "tests/fixtures/manual_reconcile_command.json"
    input_correlation_id_field: "correlation_id"
  output:
    topic: "onex.evt.artifact.change-detected.v1"
    output_correlation_id_field: "correlation_id"
    schema_name: "ModelChangeDetectionResult"
    assertions:
      - field: "source"
        op: "eq"
        value: "manual"
  timeout_ms: 30000
  infra: "mock"
dod_evidence:
  - id: "dod-001"
    description: "CLI command is registered and options are correctly typed"
    source: "manual"
    linear_dod_text: "Click command artifact-reconcile is registered with --repo, --files, --reason options"
    checks:
      - check_type: "command"
        check_value: "uv run omni-infra artifact-reconcile --help"
  - id: "dod-002"
    description: "ModelManualReconcileCommand is published to correct topic"
    source: "manual"
    linear_dod_text: "Command published to onex.cmd.artifact.reconcile.v1 using KAFKA_BOOTSTRAP_SERVERS"
    checks:
      - check_type: "test_passes"
        check_value: "uv run pytest tests/unit/ -k artifact_reconcile -v -m unit"
  - id: "dod-003"
    description: "mypy strict passes on CLI module"
    source: "manual"
    linear_dod_text: "mypy --strict passes on artifact_reconcile CLI module"
    checks:
      - check_type: "command"
        check_value: "uv run mypy src/omnibase_infra/cli/artifact_reconcile.py --strict"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
