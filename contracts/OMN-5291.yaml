---
schema_version: "1.0.0"
ticket_id: OMN-5291
summary: "Emit governance events to Kafka from onex_change_control CLI tools"
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - topics
  - events
published_events:
  - topic: onex.evt.onex-change-control.governance-check-completed.v1
    event_type: GovernanceCheckCompleted
    description: >
      Emitted after validate-yaml or check-schema-purity completes. Payload includes tool name, exit code,
      and file count.
  - topic: onex.evt.onex-change-control.cosmetic-compliance-scored.v1
    event_type: CosmeticComplianceScored
    description: >
      Emitted after cosmetic-lint completes. Payload includes violation count and per-file scores.
  - topic: onex.evt.onex-change-control.drift-detected.v1
    event_type: DriftDetected
    description: >
      Available for future use. Emitted when contract/runtime topic mapping drift is detected by check_contract_drift.py.
evidence_requirements:
  - kind: tests
    description: >
      Governance emitter unit tests cover all three emit functions and verify correct topic names, envelope
      structure, and silent no-op behavior when kafka-python is absent.
    command: >
      cd /Volumes/PRO-G40/Code/omni_worktrees/OMN-5291/onex_change_control && uv run pytest tests/ -k
      "emitter or governance" -v
  - kind: ci
    description: >
      mypy --strict passes on the new kafka/ module with no type errors.
    command: >
      cd /Volumes/PRO-G40/Code/omni_worktrees/OMN-5291/onex_change_control && uv run mypy src/onex_change_control/kafka/
      --strict
golden_path:
  input:
    topic: "onex.cmd.onex-change-control.validate-yaml.v1"
    fixture: "tests/fixtures/validate_yaml_trigger.json"
    input_correlation_id_field: "correlation_id"
  output:
    topic: "onex.evt.onex-change-control.governance-check-completed.v1"
    output_correlation_id_field: "correlation_id"
    schema_name: "ModelGovernanceCheckCompleted"
    assertions:
      - field: "exit_code"
        op: "eq"
        value: 0
  timeout_ms: 30000
  infra: "mock"
dod_evidence:
  - id: "dod-001"
    description: "Governance emitter unit tests pass"
    source: "manual"
    linear_dod_text: "Unit tests cover all three emit functions, verify topic names, envelope structure,
      and silent no-op"
    checks:
      - check_type: "test_passes"
        check_value: "uv run pytest tests/ -k 'emitter or governance' -v"
  - id: "dod-002"
    description: "mypy strict passes on kafka module"
    source: "manual"
    linear_dod_text: "mypy --strict passes on kafka/ module"
    checks:
      - check_type: "command"
        check_value: "uv run mypy src/onex_change_control/kafka/ --strict"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
