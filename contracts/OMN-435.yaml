        check_value: "gh pr view 1381 --repo OmniNode-ai/omnibase_infra --json state,baseRefName -q '[.state,
          .baseRefName] | @tsv'"
  - id: "dod-002"
    description: "omnibase_infra PR #1381 diff includes integration test file for SSRF"
    source: "generated"
