---
schema_version: '1.0.0'
ticket_id: OMN-9335
summary: 'feat(topics): move TopicBase enum from omniclaude to omnibase_core — canonical topic helpers'
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - topics
  - public_api
evidence_requirements:
  - kind: ci
    description: CI passes on merge PR
    command: gh pr checks
  - kind: tests
    description: Unit tests for TopicBase and build_topic
    command: uv run pytest tests/unit/test_topics.py -v
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: PR opened against main branch
    source: generated
    checks:
      - check_type: command
        check_value: 'state=$(gh pr view {pr} --repo {repo} --json state,baseRefName -q ''[.state, .baseRefName]
          | @tsv''); [ "$(echo "$state" | cut -f1)" = "OPEN" ] && [ "$(echo "$state" | cut -f2)" = "main"
          ]'
  - id: dod-002
    description: Contract artifact file present in repo
    source: generated
    checks:
      - check_type: command
        check_value: test -f contracts/OMN-9335.yaml
  - id: dod-003
    description: CI passes on PR
    source: generated
    checks:
      - check_type: command
        check_value: 'result=$(gh pr view {pr} --repo {repo} --json statusCheckRollup -q ''[.statusCheckRollup[]
          | select(.name == "validate") | .conclusion] | first // empty''); [ "$result" = "SUCCESS" ]'
