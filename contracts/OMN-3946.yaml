---
schema_version: "1.0.0"
ticket_id: OMN-3946
summary: "GitHub Action workflow and Python publisher script for PR webhook events on onex.evt.github.pr-webhook.v1"
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - topics
  - events
evidence_requirements:
  - kind: tests
    description: >
      Python publisher script validates ModelPRWebhookEvent via Pydantic before publish; dry-run mode
      (no broker) exits 0 and prints the serialized event JSON to stdout.
    command: "python scripts/publish_pr_webhook_event.py --dry-run --repo test/repo --action opened --pr-number
      1"

  - kind: ci
    description: >
      GitHub Action workflow YAML is syntactically valid and triggers on pull_request events (opened,
      synchronize, closed, reopened). Workflow uses tj-actions/changed-files to populate file list passed
      to publisher script.
    command: "python -c \"import yaml; yaml.safe_load(open('.github/workflows/artifact-reconciliation-webhook.yml'))\""

  - kind: ci
    description: >
      Publisher script exits non-zero on delivery error so GitHub Action surfaces failures. SASL_SSL credentials
      injected from GitHub Secrets (not hardcoded).
    command: "grep -n 'SASL_SSL\\|ssl.ca.location\\|sasl.username\\|sasl.password' scripts/publish_pr_webhook_event.py"

  - kind: tests
    description: "Full unit test suite passes with no regressions."
    command: "uv run pytest tests/ -m unit -v"

golden_path:
  input:
    topic: "onex.cmd.github.pr-webhook-publish.v1"
    fixture: "tests/fixtures/github_pr_webhook_publish.json"
    input_correlation_id_field: "correlation_id"
  output:
    topic: "onex.evt.github.pr-webhook.v1"
    output_correlation_id_field: "correlation_id"
    schema_name: "ModelPRWebhookEvent"
    assertions:
      - field: "action"
        op: "in"
        value: ["opened", "synchronize", "closed", "reopened"]
  timeout_ms: 30000
  infra: "real"
dod_evidence:
  - id: "dod-001"
    description: "Publisher script validates event via Pydantic and supports dry-run"
    source: "manual"
    linear_dod_text: "Python publisher validates ModelPRWebhookEvent; dry-run exits 0 with JSON output"
    checks:
      - check_type: "command"
        check_value: "python scripts/publish_pr_webhook_event.py --dry-run --repo test/repo --action opened
          --pr-number 1"
  - id: "dod-002"
    description: "GitHub Action workflow is syntactically valid"
    source: "manual"
    linear_dod_text: "Workflow YAML is valid and triggers on pull_request events"
    checks:
      - check_type: "file_exists"
        check_value: ".github/workflows/artifact-reconciliation-webhook.yml"
  - id: "dod-003"
    description: "Publisher uses secrets, not hardcoded credentials"
    source: "manual"
    linear_dod_text: "SASL_SSL credentials injected from GitHub Secrets"
    checks:
      - check_type: "grep"
        check_value:
          file: "scripts/publish_pr_webhook_event.py"
          pattern: "SASL_SSL"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
