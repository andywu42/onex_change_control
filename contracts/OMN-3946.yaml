---
schema_version: "1.0.0"
ticket_id: OMN-3946
summary: "GitHub Action workflow and Python publisher script for PR webhook events on onex.evt.github.pr-webhook.v1"
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - topics
  - events
evidence_requirements:
  - kind: tests
    description: >
      Python publisher script validates ModelPRWebhookEvent via Pydantic before publish; dry-run mode
      (no broker) exits 0 and prints the serialized event JSON to stdout.
    command: "python scripts/publish_pr_webhook_event.py --dry-run --repo test/repo --action opened --pr-number
      1"

  - kind: ci
    description: >
      GitHub Action workflow YAML is syntactically valid and triggers on pull_request events (opened,
      synchronize, closed, reopened). Workflow uses tj-actions/changed-files to populate file list passed
      to publisher script.
    command: "python -c \"import yaml; yaml.safe_load(open('.github/workflows/artifact-reconciliation-webhook.yml'))\""

  - kind: ci
    description: >
      Publisher script exits non-zero on delivery error so GitHub Action surfaces failures. SASL_SSL credentials
      injected from GitHub Secrets (not hardcoded).
    command: "grep -n 'SASL_SSL\\|ssl.ca.location\\|sasl.username\\|sasl.password' scripts/publish_pr_webhook_event.py"

  - kind: tests
    description: "Full unit test suite passes with no regressions."
    command: "uv run pytest tests/ -m unit -v"

emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
