#
# Reusable CodeQL workflow for all OmniNode repositories.
#
# Usage in a caller repo:
#
#   jobs:
#     codeql:
#       uses: OmniNode-ai/onex_change_control/.github/workflows/codeql-reusable.yml@main
#       with:
#         language: python          # or javascript-typescript, go, java, etc.
#         query_suite: security-and-quality
#       permissions:
#         actions: read
#         contents: read
#         security-events: write
#
# OMN-5420

name: CodeQL Reusable

on:
  workflow_call:
    inputs:
      language:
        description: >
          CodeQL language to analyze. Common values: python, javascript-typescript,
          go, java, csharp, cpp, ruby, swift. Defaults to python.
        type: string
        required: false
        default: python
      query_suite:
        description: >
          CodeQL query suite to run. Use "security-and-quality" for combined
          security + quality checks (recommended). Use "security-extended" for
          a broader security-only sweep.
        type: string
        required: false
        default: security-and-quality

jobs:
  analyze:
    name: CodeQL Analysis (${{ inputs.language }})
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ inputs.language }}
          queries: ${{ inputs.query_suite }}

      # For compiled languages (Java, C/C++, Go, C#, Swift) CodeQL needs an
      # explicit build step. For interpreted languages (Python, JavaScript,
      # Ruby) autobuild is sufficient.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ inputs.language }}
