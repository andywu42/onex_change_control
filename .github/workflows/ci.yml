name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  type-check:
    # Note: This job runs mypy separately from pre-commit for full codebase checking.
    # Pre-commit hook runs mypy only on changed files (pre-push stage), while this job
    # checks the entire codebase (src/ and tests/) to catch type errors across all files.
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run mypy
        run: uv run mypy src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run tests with coverage
        run: uv run pytest --cov=onex_change_control --cov-report=term-missing

  schema-purity:
    name: Schema Purity & Naming Check
    runs-on: ubuntu-latest
    needs: [test]  # Fail fast if tests don't pass
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Check schema purity and naming conventions
        run: uv run check-schema-purity

  ai-slop-check:
    name: AI-Slop Pattern Check (strict, PR diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Compute changed Python/Markdown files vs PR base
        id: changed
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin "${{ github.base_ref }}" --no-tags --depth=1
            FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- '*.py' '*.md' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 -- '*.py' '*.md' 2>/dev/null | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
      - name: Check changed files for AI-slop patterns (strict)
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -z "$FILES" ]; then exit 0; fi
          python scripts/validation/check_ai_slop.py --strict $FILES

  context-integrity-contracts:
    name: Context Integrity Contract Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Check context integrity contract references (dry-run, no agents root)
        # This job validates the script itself works correctly. When an agents-root
        # directory is available (e.g. from a checked-out omniclaude), pass it as
        # --agents-root. Until then, run with an empty self-test dir so CI stays green.
        run: |
          mkdir -p /tmp/ci_agents_stub /tmp/ci_contracts_stub
          python scripts/check_context_integrity_contracts.py \
            --agents-root /tmp/ci_agents_stub \
            --contracts-root /tmp/ci_contracts_stub \
            --dry-run

  migration-conflicts:
    name: Migration Conflict Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Clone cross-repo dependencies
        run: |
          mkdir -p /tmp/omni_repos
          git clone --depth=1 https://github.com/OmniNode-ai/omniintelligence.git /tmp/omni_repos/omniintelligence
          git clone --depth=1 https://github.com/OmniNode-ai/omnibase_infra.git /tmp/omni_repos/omnibase_infra
          git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git /tmp/omni_repos/omnimemory
      - name: Check for migration conflicts
        # warn-only: Known duplicate migrations exist between omnibase_infra and
        # omniintelligence (legacy table co-ownership). Remove --warn-only once
        # migration ownership is consolidated to a single repo per table.
        run: uv run check-migration-conflicts --repos-root /tmp/omni_repos --warn-only

  kafka-boundary-parity:
    name: Kafka Boundary Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Clone cross-repo dependencies
        run: |
          mkdir -p /tmp/omni_repos
          git clone --depth=1 https://github.com/OmniNode-ai/omniclaude.git /tmp/omni_repos/omniclaude
          git clone --depth=1 https://github.com/OmniNode-ai/omnidash.git /tmp/omni_repos/omnidash
          git clone --depth=1 https://github.com/OmniNode-ai/omniintelligence.git /tmp/omni_repos/omniintelligence
          git clone --depth=1 https://github.com/OmniNode-ai/omnibase_infra.git /tmp/omni_repos/omnibase_infra
          git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git /tmp/omni_repos/omnimemory
      - name: Check Kafka boundary parity
        # continue-on-error: Known mismatches exist in upstream repos.
        # Remove once all boundaries are fixed (tracked in OMN-5640).
        continue-on-error: true
        run: uv run check-boundary-parity --repos-root /tmp/omni_repos

  seam-contract-coverage:
    name: Seam Contract Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Fetch base branch for diff
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin "${{ github.base_ref }}" --no-tags --depth=1
          fi
      - name: Check seam contract coverage
        run: |
          BASE="${{ github.base_ref && format('origin/{0}', github.base_ref) || 'HEAD~1' }}"
          uv run python scripts/validation/check_seam_contract_coverage.py --base "$BASE"

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [pre-commit, type-check, schema-purity, context-integrity-contracts, migration-conflicts, kafka-boundary-parity, seam-contract-coverage]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed"
