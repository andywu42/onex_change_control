# DoD Sweep Exemptions
#
# GOVERNANCE DOCTRINE:
# Exemptions are rollout scaffolding, not permanent normalization.
# - Cutoff-date exemptions are a one-time migration aid. Review and consider
#   removing after initial rollout proves stable (target: 2 weeks post-soft-mode).
# - Explicit exemptions must include a reason and tracking ticket where applicable.
# - Exempted tickets appear as UNKNOWN (not PASS) in sweep reports to prevent
#   false confidence in DoD compliance rates.
#
# REVIEW SCHEDULE:
# After graduating enforcement to soft mode, review this file within 2 weeks.
# If cutoff_date is still present after 1 month of soft enforcement, create
# a ticket to evaluate whether it should be removed or narrowed.
#
# SUNSET TRIGGER:
# Cutoff-based exemptions MUST be reviewed once EITHER:
#   (a) 4 weeks have passed since soft-mode graduation, OR
#   (b) soft-mode warning volume drops below 10% of swept tickets
# whichever occurs first. At that point, remove the cutoff or narrow it.
# Stable or growing exemption volume should be treated as an
# enforcement-health regression, not a sign that exemptions are working.

# Tickets completed before this date are automatically exempt.
# This exists to bootstrap the sweep without retroactively failing
# every historical ticket that predates the contract system.
cutoff_date: "2026-03-23"

exemptions: []
# Each exemption MUST include:
#   ticket_id: "OMN-XXXX"
#   reason: "Why this ticket is exempt" (REQUIRED -- blank reason is invalid)
#   tracking_ticket: "OMN-YYYY" (optional -- link to remediation if applicable)
#   expires_on: "YYYY-MM-DD" (optional -- auto-remove after this date)
#
# POST-ROLLOUT RULE:
# After enforcement graduates to soft mode, new explicit exemptions MUST include
# a tracking_ticket or documented remediation path, unless the ticket is permanently
# non-code / non-artifact by nature (e.g., pure process tickets). This prevents
# the exemption file from becoming a soft landfill. Changes to this file should
# be reviewed in PR review with the same scrutiny as production code.
#
# Example:
# - ticket_id: "OMN-XXXX"
#   reason: "Pure documentation ticket, no code artifacts"
# - ticket_id: "OMN-YYYY"
#   reason: "Emergency hotfix, DoD deferred"
#   tracking_ticket: "OMN-ZZZZ"
#   expires_on: "2026-04-01"
