#
# Reusable workflow: contract compliance gate.
# Each repo's CI clones onex_change_control and calls this script to validate
# that PRs do not violate pinned contract hashes.
#
# Usage in a repo's CI:
#
#   jobs:
#     contract-compliance:
#       uses: OmniNode-ai/onex_change_control/.github/workflows/contract-compliance.yml@main
#
# Or inline (copy the steps below into the repo's own ci.yml):
#
#   - name: Clone onex_change_control
#     run: git clone --depth=1 https://github.com/OmniNode-ai/onex_change_control.git /tmp/onex_change_control
#
#   - name: Verify compliance script exists
#     run: |
#       if [ ! -f onex_change_control/scripts/ci/run_contract_compliance_check.py ]; then
#         echo "ERROR: Contract compliance script not found at expected path"
#         exit 1
#       fi
#
#   - name: Install pyyaml
#     run: pip install pyyaml
#
#   - name: Run contract compliance check
#     run: |
#       python /tmp/onex_change_control/scripts/ci/run_contract_compliance_check.py \
#         --pr ${{ github.event.pull_request.number }} \
#         --repo ${{ github.repository }} \
#         --contracts-dir /tmp/onex_change_control/contracts
#     env:
#       EMERGENCY_BYPASS: ${{ secrets.EMERGENCY_BYPASS || '' }}
#       GH_TOKEN: ${{ github.token }}
name: Contract Compliance

on:
  workflow_call:

jobs:
  contract-compliance:
    name: Contract Compliance Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Clone onex_change_control
        run: git clone --depth=1 https://github.com/OmniNode-ai/onex_change_control.git onex_change_control

      - name: Verify compliance script exists
        run: |
          if [ ! -f onex_change_control/scripts/ci/run_contract_compliance_check.py ]; then
            echo "ERROR: Contract compliance script not found at expected path"
            echo "Expected: onex_change_control/scripts/ci/run_contract_compliance_check.py"
            exit 1
          fi

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Run contract compliance check
        run: |
          python onex_change_control/scripts/ci/run_contract_compliance_check.py \
            --pr ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --contracts-dir onex_change_control/contracts
        env:
          EMERGENCY_BYPASS: ${{ secrets.EMERGENCY_BYPASS || '' }}
          GH_TOKEN: ${{ github.token }}
