name: handlers
contract_version: {major: 1, minor: 1, patch: 0}
description: >
  Pure-function handler library for onex_change_control structured workflows. Handlers return typed Pydantic
  results (no I/O on stdout, no side effects beyond filesystem reads from the changed-control corpus).
  Co-located with the modules they expose; not orchestrators or effects. #magic___^_^___line
public_api:
  - module: onex_change_control.handlers.handler_dod_sweep
    exports:
      - run_dod_sweep
      - check_contract_exists
      - check_receipt_exists
      - check_receipt_clean
      - fetch_completed_tickets
      - load_exemptions
      - is_exempt
  - module: onex_change_control.handlers.handler_drift_analysis
    exports:
      - analyze_drift
  - module: onex_change_control.handlers.handler_dependency_analysis
    exports:
      - analyze_dependencies

# OMN-9791 (Wave C / Task 11): handler_dod_sweep.check_receipt_exists now
# reconciles the canonical drift/dod_receipts/<TICKET>/<ITEM_ID>/<ts>.yaml
# corpus with the legacy .evidence/<TICKET>/dod_report.json, with a hard
# 2026-06-01 cutoff enforced via _LEGACY_RECEIPT_CUTOFF. Both check_receipt_exists
# and run_dod_sweep accept an injected `now: datetime | None` so the cutoff
# is testable deterministically. See docs/RECEIPT_LOCATIONS.md.

transport_type: NONE
