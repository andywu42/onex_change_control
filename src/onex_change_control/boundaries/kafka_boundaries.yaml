---
# kafka_boundaries.yaml — Cross-repo Kafka boundary manifest
#
# Maps every Kafka topic that crosses a repository boundary (producer in one repo,
# consumer in another). Used by check_boundary_parity.py to detect regressions
# at Kafka seams (topic renames, missing producers/consumers).
#
# OMN-5640: Layer 1 — Static Kafka Boundary Parity
#
# Rules:
#   - Only list topics where producer_repo != consumer_repo
#   - producer_file / consumer_file are relative to the repo root
#   - topic_pattern is a regex that must match somewhere in the file contents
#   - event_schema is the Pydantic model name (informational, not validated yet)
#
# Sources:
#   - omniclaude: src/omniclaude/hooks/topics.py (TopicBase enum)
#   - omnidash: topics.yaml (read_model_topics manifest)
#   - omniintelligence: src/omniintelligence/topics.py, debug_intel/topics.py
#   - omnibase_infra: src/omnibase_infra/topics/platform_topic_suffixes.py

version: "1"

boundaries:

