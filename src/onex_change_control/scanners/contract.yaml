name: scanners
contract_version: {major: 1, minor: 0, patch: 0}
description: >
  AST-based scanner library for handler/contract cross-reference compliance, doc staleness detection,
  model dump drift, and wire schema compliance checks. All scanners are pure functions with no side effects.

public_api:
  - module: onex_change_control.scanners.handler_contract_compliance
    exports:
      - parse_contract_topics
      - parse_contract_transports
      - parse_contract_handler_routing
      - scan_handler_topics
      - scan_handler_transports
      - scan_node_py_logic
      - cross_reference
  - module: onex_change_control.scanners.wire_schema_compliance
    exports:
      - scan_wire_schema_compliance
  - module: onex_change_control.scanners.doc_staleness_detector
    exports:
      - scan_doc_staleness
  - module: onex_change_control.scanners.model_dump_drift
    exports:
      - scan_model_dump_drift

transport_type: NONE
