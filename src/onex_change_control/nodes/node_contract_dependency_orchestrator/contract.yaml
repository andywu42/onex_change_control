name: node_contract_dependency_orchestrator
contract_name: node_contract_dependency_orchestrator
node_name: node_contract_dependency_orchestrator
contract_version: {major: 1, minor: 0, patch: 0}
node_version: {major: 1, minor: 0, patch: 0}
node_type: ORCHESTRATOR

description: >
  Coordinates the contract overlap analysis pipeline: COMPUTE (analyze overlap) -> REDUCER (accumulate
  history) -> EFFECT (emit event + persist to Memgraph). #magic___^_^___line
capabilities:
  - name: contract.dependency.orchestrate
    version: "1.0.0"
    description: "Orchestrate contract dependency analysis pipeline"

downstream_nodes:
  - node_name: node_contract_dependency_compute
    node_type: compute
    description: "Compute protocol overlap graph from contract declarations"
  - node_name: node_contract_dependency_reducer
    node_type: reducer
    description: "Accumulate dependency patterns and detect hotspot trends"
  - node_name: node_contract_dependency_effect
    node_type: effect
    description: "Emit events and persist graph to Memgraph"

invariants:
  no_direct_io: true
  no_subprocess_calls: true
  react_to_structured_results_only: true

descriptor:
  node_archetype: orchestrator
  purity: pure
  idempotent: true
