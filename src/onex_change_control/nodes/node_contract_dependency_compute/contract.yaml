name: node_contract_dependency_compute
contract_name: node_contract_dependency_compute
node_name: node_contract_dependency_compute
contract_version: {major: 1, minor: 0, patch: 0}
node_version: {major: 1, minor: 0, patch: 0}
node_type: COMPUTE_GENERIC

description: >
  Computes protocol-level dependency graph from contract.yaml declarations across repos. Detects topic
  overlap, protocol surface overlap, and DB table overlap between nodes. Outputs dependency edges and
  conservative overlap-based parallel groups (waves).
input_model:
  type_name: ModelContractDependencyInput
  module: onex_change_control.models.model_contract_dependency_input

output_model:
  type_name: ModelContractDependencyOutput
  module: onex_change_control.models.model_contract_dependency_output

capabilities:
  - name: contract.dependency.compute
    version: "1.0.0"
    description: "Compute contract overlap graph from protocol surface declarations"

io_operations:
  - operation_id: contract_dependency
    description: "Build overlap graph from contract entries"
    input_type: ModelContractDependencyInput
    output_type: ModelContractDependencyOutput
    idempotent: true

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  deterministic: true
  timeout_ms: 10000
