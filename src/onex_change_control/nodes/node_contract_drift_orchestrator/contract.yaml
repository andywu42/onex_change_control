name: node_contract_drift_orchestrator
contract_name: node_contract_drift_orchestrator
node_name: node_contract_drift_orchestrator
contract_version: {major: 1, minor: 0, patch: 0}
node_version: {major: 1, minor: 0, patch: 0}
node_type: ORCHESTRATOR

description: >
  Coordinates the contract drift detection pipeline: COMPUTE (detect) -> REDUCER (accumulate history)
  -> EFFECT (emit event). #magic___^_^___line
capabilities:
  - name: contract.drift.orchestrate
    version: "1.0.0"
    description: "Orchestrate contract drift detection pipeline"

downstream_nodes:
  - node_name: node_contract_drift_compute
    node_type: compute
    description: "Detect and classify field-level contract drift"
  - node_name: node_contract_drift_reducer
    node_type: reducer
    description: "Accumulate drift history per contract"
  - node_name: node_contract_drift_effect
    node_type: effect
    description: "Emit Kafka events on drift detection"

invariants:
  no_direct_io: true
  no_subprocess_calls: true
  react_to_structured_results_only: true

descriptor:
  node_archetype: orchestrator
  purity: pure
  idempotent: true
