name: node_contract_dependency_effect
contract_name: node_contract_dependency_effect
node_name: node_contract_dependency_effect
contract_version: {major: 1, minor: 0, patch: 0}
node_version: {major: 1, minor: 0, patch: 0}
node_type: EFFECT_GENERIC

description: >
  Emits Kafka events when contract dependency graph is computed. Persists graph to Memgraph for historical
  queries. Consumers (merge_sweep, wave_scheduler, epic_team) subscribe to dependency graph events for
  parallel execution ordering. #magic___^_^___line
event_bus:
  topic_base: "onex.evt.onex-change-control.contract-dependency-computed.v1"
  partition_key_field: "repo"
  partition_strategy: "hash"

io_operations:
  - operation_id: emit_dependency_event
    description: "Emit contract dependency graph event to Kafka"
    idempotent: false
  - operation_id: persist_to_memgraph
    description: "Upsert dependency edges and nodes into Memgraph"
    idempotent: true

handler_routing:
  routing_strategy: backend_match
  default_backend: kafka

descriptor:
  node_archetype: effect
  purity: impure
  idempotent: false
