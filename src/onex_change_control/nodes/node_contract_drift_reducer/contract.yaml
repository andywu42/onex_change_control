name: node_contract_drift_reducer
contract_name: node_contract_drift_reducer
node_name: node_contract_drift_reducer
contract_version: {major: 1, minor: 0, patch: 0}
node_version: {major: 1, minor: 0, patch: 0}
node_type: REDUCER_GENERIC

description: >
  Accumulates contract drift detection results over time per contract. Tracks drift state transitions:
  clean -> drifted -> acknowledged -> resolved. Emits intents for effect nodes when drift state changes.

input_model:
  type_name: ModelContractDriftOutput
  module: onex_change_control.models.model_contract_drift_output

output_model:
  type_name: ModelDriftHistory
  module: onex_change_control.models.model_drift_history

state_machine:
  initial_state: clean
  states:
    - clean
    - drifted
  # Phase 1: only transitions derivable from ModelContractDriftOutput.
  # `acknowledge` and `resolve` require an explicit external operator action
  # model (e.g. ModelDriftAcknowledgement) that does not exist yet. Those
  # states are deferred — do not add them without adding the input model.
  transitions:
    - trigger: drift_detected
      source: clean
      dest: drifted
      conditions: ["drift_detected == true"]
    - trigger: drift_detected
      source: drifted
      dest: drifted
    - trigger: no_drift
      source: drifted
      dest: clean
    - trigger: no_drift
      source: clean
      dest: clean

descriptor:
  node_archetype: reducer
  purity: pure
  idempotent: false
  deterministic: true
