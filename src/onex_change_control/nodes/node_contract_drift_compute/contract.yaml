name: node_contract_drift_compute
contract_name: node_contract_drift_compute
node_name: node_contract_drift_compute
contract_version: {major: 1, minor: 0, patch: 0}
node_version: {major: 1, minor: 0, patch: 0}
node_type: COMPUTE_GENERIC

description: >
  Detects drift between a deployed ONEX contract and its pinned baseline. Classifies field-level changes
  as BREAKING, ADDITIVE, or NON_BREAKING. #magic___^_^___line
input_model:
  type_name: ModelContractDriftInput
  module: onex_change_control.models.model_contract_drift_input

output_model:
  type_name: ModelContractDriftOutput
  module: onex_change_control.models.model_contract_drift_output

capabilities:
  - name: contract.drift.detect
    version: "1.0.0"
    description: "Detect and classify contract drift"

io_operations:
  - operation_id: contract_drift
    description: "Hash-only drift check — reports BREAKING if hash changed, NONE otherwise"
    input_type: ModelContractDriftInput
    output_type: ModelContractDriftOutput
    idempotent: true
  - operation_id: contract_drift_detailed
    description: "Field-level diff when pinned contract dict is available"
    input_type: ModelContractDriftInput
    output_type: ModelContractDriftOutput
    idempotent: true

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  deterministic: true
  timeout_ms: 5000
