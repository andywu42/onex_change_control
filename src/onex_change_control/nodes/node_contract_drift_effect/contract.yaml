name: node_contract_drift_effect
contract_name: node_contract_drift_effect
node_name: node_contract_drift_effect
contract_version: {major: 1, minor: 0, patch: 0}
node_version: {major: 1, minor: 0, patch: 0}
node_type: EFFECT_GENERIC

description: >
  Emits Kafka events when contract drift is detected. Consumes drift detection intents from the reducer
  and publishes structured events for downstream consumers (dashboards, alerting). #magic___^_^___line
event_bus:
  topic_base: "onex.evt.onex-change-control.contract-drift-detected.v1"
  partition_key_field: "contract_name"
  partition_strategy: "hash"

io_operations:
  - operation_id: emit_drift_event
    description: "Emit contract drift detection event to Kafka"
    idempotent: false

handler_routing:
  routing_strategy: backend_match
  default_backend: kafka

descriptor:
  node_archetype: effect
  purity: impure
  idempotent: false
